version: '3.8'

services:
  api:
    build:
      context: ./backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "47121:8000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/activia_trace
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
    command: ["python", "-m", "workers.main"]
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/activia_trace
    volumes:
      - ./backend:/app

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: activia_trace
    ports:
      - "47122:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d activia_trace"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-test-db.sql:/docker-entrypoint-initdb.d/init.sql

  frontend:
    build:
      context: ./frontend
      target: builder
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    ports:
      - "47120:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  postgres_data:
